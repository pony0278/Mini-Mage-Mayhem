name: Deploy to GitHub Pages

# DISABLED auto-run: GitHub Pages is currently served via "Deploy from a branch"
# (Settings -> Pages -> main / root, with .nojekyll). This workflow no longer
# runs on push (it would fail, since the Pages source is the branch, not Actions).
# To switch back to Actions-based deploys: set Pages Source to "GitHub Actions"
# and re-add the `push:` trigger below.
on:
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        # Publish the repo root (index.html + camera sandbox + vendor/ + .nojekyll).
        run: |
          mkdir -p _site/vendor
          cp index.html _site/index.html
          cp camera-sandbox.html _site/camera-sandbox.html
          cp .nojekyll _site/.nojekyll
          cp -r vendor/* _site/vendor/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Turn GitHub Pages on (source = GitHub Actions) automatically,
          # so no manual repo-settings step is required.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
