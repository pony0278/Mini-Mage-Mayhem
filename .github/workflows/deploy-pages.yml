name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        # Serve the game at the site root as index.html, plus vendored libs.
        run: |
          mkdir -p _site/vendor
          cp mini_mage_mayhem_demo_v0_8.html _site/index.html
          cp -r vendor/* _site/vendor/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Turn GitHub Pages on (source = GitHub Actions) automatically,
          # so no manual repo-settings step is required.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
