<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f6cff'/%3E%3Ccircle cx='8' cy='6' r='2.4' fill='%23ffd36d'/%3E%3C/svg%3E" />
  <title>Mini Mage Mayhem — Camera Sandbox</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8f3e8;
      user-select: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, #33213b 0%, #17141f 58%, #08070c 100%);
    }
    #stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.5));
      height: min(100vh, calc(100vw / 1.5));
      box-shadow: 0 0 0 2px #6a4a77, 0 0 0 6px rgba(255,211,109,.08), 0 22px 60px rgba(0,0,0,.55);
      background: #1d1723;
      cursor: crosshair;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* #game = 3D world (WebGL); #hud = crisp 2D overlay on top */
    #hud { pointer-events: none; background: transparent; }
    #cam-panel{position:absolute;top:14px;left:14px;z-index:30;width:248px;background:rgba(16,13,22,.92);
      border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:10px 12px;color:#f3e9dc;
      font:600 12px system-ui,sans-serif;pointer-events:auto;box-shadow:0 8px 26px rgba(0,0,0,.5)}
    #cam-panel.hidden{display:none}
    #cam-panel label{display:block;margin:9px 0 1px}
    #cam-panel input[type=range]{width:100%;margin-top:2px;accent-color:#ffd36d}
    #cam-panel .cp-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    #cam-panel .cp-readout{margin:9px 0;padding:7px 8px;background:rgba(0,0,0,.38);border-radius:6px;
      font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;color:#bfead0;line-height:1.5}
    #cam-panel button,#cp-show{background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:6px;
      padding:5px 9px;cursor:pointer;font:600 12px system-ui,sans-serif}
    #cam-panel button:hover,#cp-show:hover{background:#4a4057}
    #cp-pause.on{background:#6a4d2a;border-color:#ffd36d;color:#ffe6a7}
    #cp-show{position:absolute;top:14px;left:14px;z-index:30;pointer-events:auto;display:none}
  </style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="640"></canvas>
    <canvas id="hud" width="960" height="640"></canvas>
  </div>
</div>
<div id="cam-panel">
  <div class="cp-row"><b>🎥 攝影機沙盒</b><button id="cp-hide">隱藏 (H)</button></div>
  <label>FOV 視野：<span id="v-fov"></span><input id="s-fov" type="range" min="25" max="70" step="1"></label>
  <label>角度 Angle：<span id="v-angle"></span>°<input id="s-angle" type="range" min="15" max="85" step="1"></label>
  <label>距離 Distance：<span id="v-dist"></span><input id="s-dist" type="range" min="300" max="1400" step="10"></label>
  <label>看向高度 Look：<span id="v-looky"></span><input id="s-looky" type="range" min="-50" max="220" step="5"></label>
  <label>方位角 Azimuth：<span id="v-azi"></span>°<input id="s-azi" type="range" min="-180" max="180" step="5"></label>
  <label>取景偏移X PanX：<span id="v-panx"></span><input id="s-panx" type="range" min="-300" max="300" step="10"></label>
  <label>取景偏移Z PanZ：<span id="v-panz"></span><input id="s-panz" type="range" min="-300" max="300" step="10"></label>
  <div class="cp-readout" id="cp-readout"></div>
  <div class="cp-row"><button id="cp-pause" style="flex:1">⏸ 暫停 (P)</button></div>
  <div class="cp-row"><button id="cp-copy">複製設定</button><button id="cp-reset">重設</button></div>
</div>
<button id="cp-show">🎥 調攝影機</button>
<script src="vendor/three.min.js"></script>
<script type="module">
import { W, H, TILE, COLS, ROWS, TILE_FLOOR, TILE_WALL, TILE_THIN, TILE_GRASS, TILE_BURNT, TILE_WATER, TILE_ICE, TILE_ICEWALL, TILE_OIL } from './js/constants.js';
import { rnd, clamp, dist, angleTo, norm, circleRectOverlap } from './js/utils.js';
import { ELEMENT_INFO, arenaTemplates, fusionKind, isFireKind, isIceKind, isLightningKind, isPoisonKind, isEarthKind } from './js/data.js';
import { game, keys, mouse, CAM } from './js/state.js';
import { applyUpgrade, currentFlowName, dashElement, isMastery, isSecMastery, makeRunStory, nearestLiftable, previewSpellState, resetGame, shoot, spellDescription, startRun, update, upgradeDesc, upgradeName, SECONDARY } from './js/sim.js';
import { draw, updateMouseWorld, camera, mouseScreen, project } from './js/render.js';
(() => {
  'use strict';

  const canvas = document.getElementById('game');   // WebGL (3D world) canvas
  const hud = document.getElementById('hud');        // 2D overlay (HUD/text)
  const screenCtx = hud.getContext('2d');

  // `ctx` is the active 2D draw target (HUD overlay). The 3D world is drawn
  // with WebGL/Three.js; only HUD/text/menus use this 2D context.
  let ctx = screenCtx;

  // Project a world point (wx along x, wy along depth, wz = height) to HUD
  // screen pixels using the live 3D camera. Used for health bars / floating text.


  window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key.toLowerCase() === 'r' && (game.state === 'over' || game.state === 'win')) resetGame();
    if (game.state === 'title' && e.key === 'Enter') startRun();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    // Store cursor in canvas pixels; converted to a world ground point each
    // frame via a camera raycast (see updateMouseWorld), since the 3D camera moves.
    mouseScreen.x = (e.clientX - rect.left) / rect.width * W;
    mouseScreen.y = (e.clientY - rect.top) / rect.height * H;
  });
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) mouse.right = true;
    else mouse.down = true;
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button === 2) mouse.right = false;
    else mouse.down = false;
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());






  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const y = (e.clientY - rect.top) / rect.height * H;
    if (game.state === 'title') { startRun(); return; }
    if (game.state !== 'upgrade') return;
    for (let i = 0; i < game.upgrades.length; i++) {
      const bx = 210 + i * 185;
      const by = 220;
      if (x >= bx && x <= bx + 165 && y >= by && y <= by + 170) applyUpgrade(i);
    }
  });

  window.addEventListener('keydown', (e) => {
    if (game.state === 'upgrade') {
      if (e.key === '1') applyUpgrade(0);
      if (e.key === '2') applyUpgrade(1);
      if (e.key === '3') applyUpgrade(2);
    }
  });


  let sandboxPaused = false;
  // --- on-screen camera control panel ---
  (function camPanel() {
    const $ = (id) => document.getElementById(id);
    const sFov = $('s-fov'), sAng = $('s-angle'), sDist = $('s-dist'), sLook = $('s-looky');
    const sAzi = $('s-azi'), sPanX = $('s-panx'), sPanZ = $('s-panz');
    if (!sFov) return;
    const DEFAULT = { fov: 33, angle: 41, dist: 720, azimuth: -35, panX: 10, panZ: -10, lookY: -10 };
    function configLine() {
      return 'CAM = { fov:' + CAM.fov + ', angle:' + CAM.angle + ', dist:' + CAM.dist
        + ', azimuth:' + CAM.azimuth + ', panX:' + CAM.panX + ', panZ:' + CAM.panZ
        + ', lookY:' + CAM.lookY + ' }';
    }
    function refresh() {
      sFov.value = CAM.fov; sAng.value = CAM.angle; sDist.value = CAM.dist; sLook.value = CAM.lookY;
      sAzi.value = CAM.azimuth; sPanX.value = CAM.panX; sPanZ.value = CAM.panZ;
      $('v-fov').textContent = CAM.fov; $('v-angle').textContent = CAM.angle;
      $('v-dist').textContent = CAM.dist; $('v-looky').textContent = CAM.lookY;
      $('v-azi').textContent = CAM.azimuth; $('v-panx').textContent = CAM.panX; $('v-panz').textContent = CAM.panZ;
      const rad = CAM.angle * Math.PI / 180;
      const h = Math.round(Math.sin(rad) * CAM.dist), b = Math.round(Math.cos(rad) * CAM.dist);
      $('cp-readout').textContent = configLine() + '\n→ height:' + h + '  半徑:' + b + '   (貼這行給我也可)';
    }
    sFov.oninput = (e) => { CAM.fov = +e.target.value; refresh(); };
    sAng.oninput = (e) => { CAM.angle = +e.target.value; refresh(); };
    sDist.oninput = (e) => { CAM.dist = +e.target.value; refresh(); };
    sLook.oninput = (e) => { CAM.lookY = +e.target.value; refresh(); };
    sAzi.oninput = (e) => { CAM.azimuth = +e.target.value; refresh(); };
    sPanX.oninput = (e) => { CAM.panX = +e.target.value; refresh(); };
    sPanZ.oninput = (e) => { CAM.panZ = +e.target.value; refresh(); };
    $('cp-copy').onclick = () => {
      if (navigator.clipboard) navigator.clipboard.writeText(configLine());
      $('cp-copy').textContent = '已複製!'; setTimeout(() => { $('cp-copy').textContent = '複製設定'; }, 1200);
    };
    $('cp-reset').onclick = () => { Object.assign(CAM, DEFAULT); refresh(); };
    function setPause(p) {
      sandboxPaused = p;
      $('cp-pause').textContent = p ? '▶ 繼續 (P)' : '⏸ 暫停 (P)';
      $('cp-pause').classList.toggle('on', p);
    }
    $('cp-pause').onclick = () => setPause(!sandboxPaused);
    function toggle(hide) {
      $('cam-panel').classList.toggle('hidden', hide);
      $('cp-show').style.display = hide ? 'block' : 'none';
    }
    $('cp-hide').onclick = () => toggle(true);
    $('cp-show').onclick = () => toggle(false);
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'h') toggle(!$('cam-panel').classList.contains('hidden'));
      if (k === 'p') setPause(!sandboxPaused);
    });
    refresh();
  })();
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    if (!sandboxPaused) { updateMouseWorld(); update(dt); } // mouse-world only when running (was inside update)
    draw();
    requestAnimationFrame(loop);
  }

  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
