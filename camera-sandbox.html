<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f6cff'/%3E%3Ccircle cx='8' cy='6' r='2.4' fill='%23ffd36d'/%3E%3C/svg%3E" />
  <title>Mini Mage Mayhem — Camera Sandbox</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8f3e8;
      user-select: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, #33213b 0%, #17141f 58%, #08070c 100%);
    }
    #stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.5));
      height: min(100vh, calc(100vw / 1.5));
      box-shadow: 0 0 0 2px #6a4a77, 0 0 0 6px rgba(255,211,109,.08), 0 22px 60px rgba(0,0,0,.55);
      background: #1d1723;
      cursor: crosshair;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* #game = 3D world (WebGL); #hud = crisp 2D overlay on top */
    #hud { pointer-events: none; background: transparent; }
    #cam-panel{position:absolute;top:14px;left:14px;z-index:30;width:248px;background:rgba(16,13,22,.92);
      border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:10px 12px;color:#f3e9dc;
      font:600 12px system-ui,sans-serif;pointer-events:auto;box-shadow:0 8px 26px rgba(0,0,0,.5)}
    #cam-panel.hidden{display:none}
    #cam-panel label{display:block;margin:9px 0 1px}
    #cam-panel input[type=range]{width:100%;margin-top:2px;accent-color:#ffd36d}
    #cam-panel .cp-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    #cam-panel .cp-readout{margin:9px 0;padding:7px 8px;background:rgba(0,0,0,.38);border-radius:6px;
      font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;color:#bfead0;line-height:1.5}
    #cam-panel button,#cp-show{background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:6px;
      padding:5px 9px;cursor:pointer;font:600 12px system-ui,sans-serif}
    #cam-panel button:hover,#cp-show:hover{background:#4a4057}
    #cam-panel textarea{width:100%;box-sizing:border-box;margin-top:3px;background:rgba(0,0,0,.38);
      color:#bfead0;border:1px solid #5a4f6a;border-radius:6px;padding:5px 7px;resize:vertical;
      font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace}
    #cp-pause.on,#cp-nomob.on{background:#6a4d2a;border-color:#ffd36d;color:#ffe6a7}
    #cp-show{position:absolute;top:14px;left:14px;z-index:30;pointer-events:auto;display:none}
  </style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="640"></canvas>
    <canvas id="hud" width="960" height="640"></canvas>
  </div>
</div>
<div id="cam-panel">
  <div class="cp-row"><b>🎥 攝影機沙盒</b><button id="cp-hide">隱藏 (H)</button></div>
  <label>FOV 視野：<span id="v-fov"></span><input id="s-fov" type="range" min="25" max="70" step="1"></label>
  <label>角度 Angle：<span id="v-angle"></span>°<input id="s-angle" type="range" min="15" max="85" step="1"></label>
  <label>距離 Distance：<span id="v-dist"></span><input id="s-dist" type="range" min="300" max="1400" step="10"></label>
  <label>看向高度 Look：<span id="v-looky"></span><input id="s-looky" type="range" min="-50" max="220" step="5"></label>
  <label>方位角 Azimuth：<span id="v-azi"></span>°<input id="s-azi" type="range" min="-180" max="180" step="5"></label>
  <label>取景偏移X PanX：<span id="v-panx"></span><input id="s-panx" type="range" min="-300" max="300" step="10"></label>
  <label>取景偏移Z PanZ：<span id="v-panz"></span><input id="s-panz" type="range" min="-300" max="300" step="10"></label>
  <div class="cp-readout" id="cp-readout"></div>
  <div class="cp-row"><button id="cp-pause" style="flex:1">⏸ 暫停 (P)</button><button id="cp-nomob">👹 怪物：開</button></div>
  <div class="cp-row"><button id="cp-copy">複製設定</button><button id="cp-reset">重設</button></div>
  <label>參數帶入：<textarea id="cp-import" rows="2" placeholder="貼入：CAM = { fov:42, angle:30, dist:760, azimuth:0, panX:0, panZ:-90, lookY:0 }"></textarea></label>
  <div class="cp-row"><button id="cp-apply" style="flex:1">套用貼入的參數</button></div>
</div>
<button id="cp-show">🎥 調攝影機</button>
<script src="vendor/three.min.js"></script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/camera-panel.js"></script>
</body>
</html>
