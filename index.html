<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f6cff'/%3E%3Ccircle cx='8' cy='6' r='2.4' fill='%23ffd36d'/%3E%3C/svg%3E" />
  <title>Mini Mage Mayhem Demo v0.8 Art Style</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8f3e8;
      user-select: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, #33213b 0%, #17141f 58%, #08070c 100%);
    }
    #stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.5));
      height: min(100vh, calc(100vw / 1.5));
      box-shadow: 0 0 0 2px #6a4a77, 0 0 0 6px rgba(255,211,109,.08), 0 22px 60px rgba(0,0,0,.55);
      background: #1d1723;
      cursor: crosshair;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* #game = 3D world (WebGL); #hud = crisp 2D overlay on top */
    #hud { pointer-events: none; background: transparent; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="640"></canvas>
    <canvas id="hud" width="960" height="640"></canvas>
  </div>
</div>
<script src="vendor/three.min.js"></script>
<script type="module">
import { W, H, TILE, COLS, ROWS, TILE_FLOOR, TILE_WALL, TILE_THIN, TILE_GRASS, TILE_BURNT, TILE_WATER, TILE_ICE, TILE_ICEWALL, TILE_OIL } from './js/constants.js';
import { rnd, clamp, dist, angleTo, norm, circleRectOverlap } from './js/utils.js';
import { ELEMENT_INFO, arenaTemplates, fusionKind, isFireKind, isIceKind, isLightningKind, isPoisonKind, isEarthKind } from './js/data.js';
import { game, keys, mouse, CAM } from './js/state.js';
import { applyUpgrade, currentFlowName, dashElement, isMastery, isSecMastery, makeRunStory, nearestLiftable, previewSpellState, resetGame, shoot, spellDescription, startRun, update, upgradeDesc, upgradeName, SECONDARY } from './js/sim.js';
import { draw, updateMouseWorld, camera, mouseScreen, project } from './js/render.js';
(() => {
  'use strict';

  const canvas = document.getElementById('game');   // WebGL (3D world) canvas
  const hud = document.getElementById('hud');        // 2D overlay (HUD/text)
  const screenCtx = hud.getContext('2d');

  // `ctx` is the active 2D draw target (HUD overlay). The 3D world is drawn
  // with WebGL/Three.js; only HUD/text/menus use this 2D context.
  let ctx = screenCtx;

  // Project a world point (wx along x, wy along depth, wz = height) to HUD
  // screen pixels using the live 3D camera. Used for health bars / floating text.


  window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key.toLowerCase() === 'r' && (game.state === 'over' || game.state === 'win')) resetGame();
    if (game.state === 'title' && e.key === 'Enter') startRun();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    // Store cursor in canvas pixels; converted to a world ground point each
    // frame via a camera raycast (see updateMouseWorld), since the 3D camera moves.
    mouseScreen.x = (e.clientX - rect.left) / rect.width * W;
    mouseScreen.y = (e.clientY - rect.top) / rect.height * H;
  });
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) mouse.right = true;
    else mouse.down = true;
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button === 2) mouse.right = false;
    else mouse.down = false;
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());






  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const y = (e.clientY - rect.top) / rect.height * H;
    if (game.state === 'title') { startRun(); return; }
    if (game.state !== 'upgrade') return;
    for (let i = 0; i < game.upgrades.length; i++) {
      const bx = 210 + i * 185;
      const by = 220;
      if (x >= bx && x <= bx + 165 && y >= by && y <= by + 170) applyUpgrade(i);
    }
  });

  window.addEventListener('keydown', (e) => {
    if (game.state === 'upgrade') {
      if (e.key === '1') applyUpgrade(0);
      if (e.key === '2') applyUpgrade(1);
      if (e.key === '3') applyUpgrade(2);
    }
  });


  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    updateMouseWorld(); // refresh cursor->world aim before the sim step (render-owned)
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
