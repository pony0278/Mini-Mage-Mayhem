    const onIce = tileAtPixel(e.x, e.y) === TILE_ICE;
    if (onIce && e.state === 'charging') {
      game.stats.iceFalls++;
      stunCharger(e, '冰面滑倒！');
      recordDisaster('盾甲怪冰面滑倒', 0, 72);
      return;
    }

    if (e.state === 'pursue') {
      e.facing = turnToward(e.facing, a, 4.2 * dt);
      e.chargeCooldown -= dt;
      const n = norm(Math.cos(e.facing), Math.sin(e.facing));
      e.vx += n.x * e.speed * speedMul * 6.2 * dt;
      e.vy += n.y * e.speed * speedMul * 6.2 * dt;
      e.vx *= Math.pow(onIce ? 0.2 : 0.0015, dt);
      e.vy *= Math.pow(onIce ? 0.2 : 0.0015, dt);
      moveEnemyWithCollision(e, dt);
      if (e.chargeCooldown <= 0 && d > 95 && d < 340 && hasLineOfSight(e.x, e.y, p.x, p.y)) {
        e.state = 'windup';
        e.stateTimer = 0.72;
        e.vx *= 0.2;
        e.vy *= 0.2;
        e.facing = a;
        addText(e.x, e.y - 36, '蓄力！', '#ff8f6e');
      }
      return;
    }

    if (e.state === 'windup') {
      e.stateTimer -= dt;
      e.facing = turnToward(e.facing, a, 2.1 * dt);
      e.vx *= Math.pow(0.02, dt);
      e.vy *= Math.pow(0.02, dt);
      if (e.stateTimer <= 0) {
        e.state = 'charging';
        e.stateTimer = 0.58;
        const n = norm(Math.cos(e.facing), Math.sin(e.facing));
        e.vx = n.x * 520 * speedMul;
        e.vy = n.y * 520 * speedMul;
        game.screenShake = Math.max(game.screenShake, 3);
      }
      return;
    }

    if (e.state === 'charging') {
      e.stateTimer -= dt;
      const hitWall = moveEnemyWithCollision(e, dt, true);
      if (hitWall) {
        stunCharger(e, '撞牆暈眩！');
        breakThinWalls(e.x, e.y, 48);
      } else if (e.stateTimer <= 0) {
        e.state = 'recover';
        e.stateTimer = 0.34;
        e.vx *= 0.45;
        e.vy *= 0.45;
      }
      return;
    }

    if (e.state === 'recover') {
      e.stateTimer -= dt;
      e.vx *= Math.pow(0.01, dt);
      e.vy *= Math.pow(0.01, dt);
      moveEnemyWithCollision(e, dt);
      if (e.stateTimer <= 0) {
        e.state = 'pursue';
        e.chargeCooldown = rnd(1.0, 1.8);
      }
      return;
    }

    if (e.state === 'stunned') {
      e.stunTimer -= dt;
      e.vx *= Math.pow(0.04, dt);
      e.vy *= Math.pow(0.04, dt);
      moveEnemyWithCollision(e, dt);
      if (e.stunTimer <= 0) {
        e.state = 'pursue';
        e.chargeCooldown = rnd(1.1, 1.9);
      }
    }
  }

  function moveEnemyWithCollision(e, dt, charging = false) {
    const nx = e.x + e.vx * dt;
    const ny = e.y + e.vy * dt;
    let hit = false;
    if (!circleHitsSolid(nx, e.y, e.r)) e.x = nx; else { e.vx *= charging ? -0.15 : -0.25; hit = true; }
    if (!circleHitsSolid(e.x, ny, e.r)) e.y = ny; else { e.vy *= charging ? -0.15 : -0.25; hit = true; }
    return hit;
  }

  function stunCharger(e, text) {
    e.state = 'stunned';
    e.stunTimer = 1.15;
    e.vx *= -0.22;
    e.vy *= -0.22;
    game.stats.chargerStuns++;
    game.screenShake = Math.max(game.screenShake, 8);
    addText(e.x, e.y - 36, text, '#d7ff8c');
    for (let i = 0; i < 12; i++) {
      game.particles.push({
        x: e.x, y: e.y,
        vx: rnd(-160, 160), vy: rnd(-160, 160),
        r: rnd(2, 4), life: rnd(0.3, 0.65), maxLife: 0.65,
        color: '#ffd36d'
      });
    }
  }

  function turnToward(current, target, maxStep) {
    const diff = Math.atan2(Math.sin(target - current), Math.cos(target - current));
    return current + clamp(diff, -maxStep, maxStep);
  }

  function hasLineOfSight(x1, y1, x2, y2) {
    const steps = Math.ceil(Math.hypot(x2 - x1, y2 - y1) / 18);
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = x1 + (x2 - x1) * t;
      const y = y1 + (y2 - y1) * t;
      if (isSolidTile(tileAtPixel(x, y))) return false;
    }
    return true;
  }



  function bossWarningLabel(type) {
    if (type === 'poison') return '毒瓶';
    if (type === 'lightning') return '雷擊';
    if (type === 'fire') return '火圈';
    if (type === 'steam') return '蒸氣';
    return '危險';
  }

  function addBossWarning(type, x, y, r, delay, color = '#ffdf7a') {
    game.bossWarnings.push({ type, x, y, r, life: delay, maxLife: delay, color, pulse: 0, label: bossWarningLabel(type) });
    game.stats.bossHazards++;
  }

  function addWaterPoolAt(x, y, radius = 56) {
    let made = 0;
    const minX = Math.floor((x - radius) / TILE);
    const maxX = Math.floor((x + radius) / TILE);
    const minY = Math.floor((y - radius) / TILE);
    const maxY = Math.floor((y + radius) / TILE);
    for (let ty = minY; ty <= maxY; ty++) {
      for (let tx = minX; tx <= maxX; tx++) {
        if (tx <= 0 || ty <= 0 || tx >= COLS - 1 || ty >= ROWS - 1) continue;
        const t = game.map[ty][tx];
        if (t === TILE_WALL || t === TILE_THIN) continue;
        const cx = tx * TILE + TILE / 2;
        const cy = ty * TILE + TILE / 2;
        if (Math.hypot(cx - x, cy - y) <= radius) { game.map[ty][tx] = TILE_WATER; made++; }
      }
    }
    addRing(x, y, radius, '#79d3ff', 0.42, 3);
    if (made > 0) addText(x, y - 28, '召喚水池', '#9fe7ff');
    return made;
  }

  function updateBossWarnings(dt) {
    for (const w of game.bossWarnings) {
      w.life -= dt;
      w.pulse += dt * 8;
      if (w.life > 0) continue;
      w.dead = true;
      if (w.type === 'poison') {
        addPoisonCloud(w.x, w.y, w.r, 5.2);
        addText(w.x, w.y - w.r, '毒瓶！', '#d998ff');
        addRing(w.x, w.y, w.r, '#d998ff', 0.36, 3);
      } else if (w.type === 'lightning') {
        addElectricZone(w.x, w.y, w.r, 0.82);
        addText(w.x, w.y - w.r, '雷擊！', '#9fe7ff');
      } else if (w.type === 'fire') {
        addFireZone(w.x, w.y, w.r, 2.1, false);
        addText(w.x, w.y - w.r, '火圈！', '#ffbd66');
        game.screenShake = Math.max(game.screenShake, 4);
      } else if (w.type === 'steam') {
        addSteamCloud(w.x, w.y, w.r, 3.0);
        addText(w.x, w.y - w.r, '蒸氣！', '#d8f6ff');
      }
    }
    game.bossWarnings = game.bossWarnings.filter(w => !w.dead);
  }

  function updateZones(dt) {
    for (const fz of game.fireZones) {
      fz.life -= dt;
      fz.tick -= dt;
      if (fz.tick <= 0) {
        fz.tick = 0.25;
        igniteGrass(fz.x, fz.y, fz.r + 4);
        if (Math.hypot(game.player.x - fz.x, game.player.y - fz.y) < game.player.r + fz.r) damagePlayer(fz.dps * 0.25, '火焰地板');
        for (const e of game.enemies) {
          if (Math.hypot(e.x - fz.x, e.y - fz.y) < e.r + fz.r) damageEnemy(e, fz.dps * 0.25, fz.x, fz.y, fz.friendly ? '友方火焰區' : 'Boss火圈');
        }
      }
    }
    game.fireZones = game.fireZones.filter(fz => fz.life > 0);

    for (const ez of game.electricZones) {
      ez.life -= dt;
      ez.pulse += dt * 18;
      ez.tick -= dt;
      if (ez.tick <= 0) {
        ez.tick = 0.18;
        if (Math.hypot(game.player.x - ez.x, game.player.y - ez.y) < game.player.r + ez.r) damagePlayer(10, '水池導電');
        for (const e of game.enemies) {
          if (Math.hypot(e.x - ez.x, e.y - ez.y) < e.r + ez.r) {
            damageEnemy(e, 16 + game.stats.storm * 4 + game.stats.shockStun * 3, ez.x, ez.y);
            if (game.stats.shockStun > 0 && e.type === 'charger' && e.state === 'charging') stunCharger(e, '雷擊麻痺！');
            e.vx *= 0.65; e.vy *= 0.65;
          }
        }
      }
    }
    game.electricZones = game.electricZones.filter(ez => ez.life > 0);

    for (const pc of game.poisonClouds) {
      pc.life -= dt;
      pc.pulse += dt * 4;
      if (Math.hypot(game.player.x - pc.x, game.player.y - pc.y) < game.player.r + pc.r) damagePlayer(pc.dps * dt, '毒霧');
      for (const e of game.enemies) {
        if (e.type !== 'bug' && Math.hypot(e.x - pc.x, e.y - pc.y) < e.r + pc.r) damageEnemy(e, pc.dps * 0.35 * dt, pc.x, pc.y);
      }
    }
    game.poisonClouds = game.poisonClouds.filter(pc => pc.life > 0);

    for (const sc of game.steamClouds) {
      sc.life -= dt;
      sc.pulse += dt * 3.4;
      sc.tick -= dt;
      if (sc.tick <= 0) {
        sc.tick = 0.22;
        for (const e of game.enemies) {
          if (Math.hypot(e.x - sc.x, e.y - sc.y) < e.r + sc.r) {
            e.slowTimer = Math.max(e.slowTimer || 0, 0.35);
            e.vx *= 0.82; e.vy *= 0.82;
          }
        }
      }
    }
    game.steamClouds = game.steamClouds.filter(sc => sc.life > 0);

    for (const ex of game.explosions) ex.life -= dt;
    game.explosions = game.explosions.filter(ex => ex.life > 0);
  }

  function updateParticles(dt) {
    for (const p of game.particles) {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= Math.pow(0.05, dt);
      p.vy *= Math.pow(0.05, dt);
    }
    game.particles = game.particles.filter(p => p.life > 0);
  }

  function updateRings(dt) {
    for (const r of game.rings) r.life -= dt;
    game.rings = game.rings.filter(r => r.life > 0);
  }

  function updateFloatingTexts(dt) {
    for (const t of game.floatingTexts) {
      t.life -= dt;
      t.y += t.vy * dt;
    }
    game.floatingTexts = game.floatingTexts.filter(t => t.life > 0);
  }

  // ===================================================================

  const ART = {
    ink: '#15101c', parchment: '#f1d8aa', gold: '#ffd36d', violet: '#9b6cff', cyan: '#9fe7ff',
    floorA: '#4b3b45', floorB: '#40313d', floorEdge: '#6a5463', grass: '#416e38', grassHi: '#94df62',
    burnt: '#2a1c18', water: '#1d5771', ice: '#bdf5ff', wall: 0x625563, wallTop: 0x887780,

  };

  // --- shared geometry / material caches ---
  const boxGeo = new THREE.BoxGeometry(1, 1, 1);
  const sphereGeo = new THREE.SphereGeometry(1, 14, 12);
  const circleGeo = new THREE.CircleGeometry(1, 36);
  const coneGeo = new THREE.ConeGeometry(1, 2, 4);
  const octaGeo = new THREE.OctahedronGeometry(1, 0);
  const tetraGeo = new THREE.TetrahedronGeometry(1, 0);
  const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 8);
  const torusGeo = new THREE.TorusGeometry(1, 0.08, 6, 24);
  const colorHex = (s) => {
    if (typeof s === 'number') return s;
    if (!s) return 0xffffff;
    if (s[0] === '#') return parseInt(s.slice(1), 16);
    return 0xffffff;

    for (const fb of game.fireballs) addProjectileModel(fb.kind, fb.x, fb.y, (fb.r || 7) * 1.25, colorHex(fb.color || '#ffffff'), fb.vx, fb.vy);
    for (const b of game.enemyProjectiles) addProjectileModel('fire', b.x, b.y, (b.r || 6) * 1.15, colorHex(b.color || '#ff8c4d'), b.vx, b.vy);
    for (const ib of game.iceBolts) addProjectileModel('ice', ib.x, ib.y, (ib.r || 6) * 1.3, 0xbff4ff, ib.vx, ib.vy);
    for (const lb of game.lightningBolts) {
      const midX = (lb.x1 + lb.x2) / 2 + Math.sin(game.time * 24 + lb.x1) * 8;
      const midY = (lb.y1 + lb.y2) / 2 + Math.cos(game.time * 21 + lb.y1) * 8;
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(lb.x1, PROJZ + 3, lb.y1),
        new THREE.Vector3(midX, PROJZ + 10, midY),
        new THREE.Vector3(lb.x2, PROJZ + 3, lb.y2)]);
      geo.__tmp = true;
      const mat = new THREE.LineBasicMaterial({ color: 0xe5fcff, transparent: true, opacity: clamp(lb.life / lb.maxLife, 0, 1) }); mat.__tmp = true;
      projGroup.add(new THREE.Line(geo, mat));
    }
  }
  function disc(x, y, r, hex, op) {
    const mat = tmpMat(hex, op, true);
    mat.depthWrite = false;
    const m = new THREE.Mesh(circleGeo, mat);
    m.rotation.x = -Math.PI / 2; m.position.set(x, 1.5, y); m.scale.setScalar(Math.max(1, r));
    zoneGroup.add(m);
  }
  function puff(x, y, r, hex, op, n = 5, height = 14) {
    for (let i = 0; i < n; i++) {
      const a = i / n * Math.PI * 2 + game.time * 0.25;
      const d = r * (0.12 + (i % 3) * 0.13);
      const m = new THREE.Mesh(sphereGeo, tmpMat(hex, op, true));
      const s = r * (0.16 + (i % 2) * 0.05);
      m.scale.set(s * 1.25, s * 0.75, s * 1.25);
      m.position.set(x + Math.cos(a) * d, height + Math.sin(game.time * 2 + i) * 3, y + Math.sin(a) * d);
      zoneGroup.add(m);
    }
  }
  function syncZones() {
    clearDynamic(zoneGroup);
    for (const pc of game.poisonClouds) {
      const a = 0.32 * clamp(pc.life / pc.maxLife, 0, 1);
      disc(pc.x, pc.y, pc.r, 0x8a36c8, a);
      puff(pc.x, pc.y, pc.r, 0xa7ff45, a * 0.75, 5, 18);
      if (Math.floor(game.time * 8 + pc.x) % 3 === 0) disc(pc.x, pc.y, pc.r * 0.42, 0xcfff6f, a * 0.5);
    }
    for (const sc of game.steamClouds) {
      const a = 0.28 * clamp(sc.life / sc.maxLife, 0, 1);
      disc(sc.x, sc.y, sc.r, 0xeaffff, a * 0.65);
      puff(sc.x, sc.y, sc.r, 0xf4ffff, a, 8, 24);
    }
    for (const fz of game.fireZones) {
      const a = 0.40 * clamp(fz.life / fz.maxLife, 0, 1);
      disc(fz.x, fz.y, fz.r, 0xff7a3e, a);
      for (let i = 0; i < 3; i++) {
        const flame = new THREE.Mesh(coneGeo, tmpMat(i % 2 ? 0xffd36d : 0xff673a, a * 1.2, true));
        const ang = game.time * 3 + i * 2.1;
        flame.scale.set(fz.r * .10, fz.r * .28, fz.r * .10);
        flame.position.set(fz.x + Math.cos(ang) * fz.r * .28, 9 + i * 2, fz.y + Math.sin(ang) * fz.r * .18);
        zoneGroup.add(flame);
      }
    }
    for (const ez of game.electricZones) {
      const a = 0.30 * clamp(ez.life / ez.maxLife, 0, 1);
      disc(ez.x, ez.y, ez.r, 0x79dcff, a);
      const ring = new THREE.Mesh(torusGeo, tmpMat(0xbdf5ff, a * 1.5, true));
      ring.rotation.x = -Math.PI / 2; ring.position.set(ez.x, 4, ez.y); ring.scale.set(ez.r, ez.r, ez.r);
      zoneGroup.add(ring);
    }
    for (const w of game.bossWarnings) {
      disc(w.x, w.y, w.r, 0xffd36d, 0.20);
      const ring = new THREE.Mesh(torusGeo, tmpMat(0xffd36d, 0.62, true));
      ring.rotation.x = -Math.PI / 2; ring.position.set(w.x, 5, w.y); ring.scale.set(w.r, w.r, w.r); zoneGroup.add(ring);
    }
    for (const ex of game.explosions) {
      const t = 1 - ex.life / ex.maxLife;
      disc(ex.x, ex.y, ex.r * (0.45 + t * 0.75), 0xffd36d, 0.28 * (ex.life / ex.maxLife));
      puff(ex.x, ex.y, ex.r, 0xff7640, 0.22 * (ex.life / ex.maxLife), 6, 30);
    }
    for (const rg of game.rings) disc(rg.x, rg.y, rg.r * (0.5 + (1 - rg.life / rg.maxLife) * 0.7), 0xffffff, 0.14 * clamp(rg.life / rg.maxLife, 0, 1));
    for (const bh of game.blackHoles) {
      disc(bh.x, bh.y, bh.r, 0x2a0f3a, 0.34);
      const t = 1 - bh.life / bh.maxLife;
      const core = new THREE.Mesh(sphereGeo, tmpMat(0x140022, 0.95, false));
      core.scale.setScalar(10 + t * 8); core.position.set(bh.x, 16, bh.y); zoneGroup.add(core);
      const ringm = new THREE.Mesh(torusGeo, tmpMat(0xb07aff, 0.7, true));
      ringm.rotation.x = -Math.PI / 2; ringm.position.set(bh.x, 4, bh.y);
      const rr = bh.r * (0.62 - t * 0.4); ringm.scale.set(rr, rr, rr); zoneGroup.add(ringm);
    }
  }

  // --- mouse -> world ground point via camera raycast ---
  const raycaster = new THREE.Raycaster();
  const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const _ndc = new THREE.Vector2();
  const _hit = new THREE.Vector3();
  function updateMouseWorld() {
    _ndc.set(mouseScreen.x / W * 2 - 1, -(mouseScreen.y / H * 2 - 1));
    raycaster.setFromCamera(_ndc, camera);
    if (raycaster.ray.intersectPlane(groundPlane, _hit)) {
      mouse.x = clamp(_hit.x, 0, W);
      mouse.y = clamp(_hit.z, 0, H);
    }
  }

  function render3D() {
    if (!gl3dOk) return;
    drawGroundTexture();
    syncWalls();
    const px = game.player ? game.player.x : W / 2;
    const pz = game.player ? game.player.y : H / 2;
    let shx = 0, shz = 0;
    if (game.screenShake > 0) { shx = rnd(-game.screenShake, game.screenShake); shz = rnd(-game.screenShake, game.screenShake); }
    const _pit = CAM.angle * Math.PI / 180, _az = CAM.azimuth * Math.PI / 180;
    const _hr = Math.cos(_pit) * CAM.dist;
    const _tx = px + CAM.panX, _tz = pz + CAM.panZ;
    camera.position.set(_tx + Math.sin(_az) * _hr + shx, Math.sin(_pit) * CAM.dist, _tz + Math.cos(_az) * _hr + shz);
    camera.lookAt(_tx, CAM.lookY, _tz);
    syncActors();
    syncProjectiles();
    syncZones();
    renderer.render(scene, camera);
  }

  // Enemy health bars, billboarded onto the HUD overlay.
  function drawEnemyBars() {
    for (const e of game.enemies) {
      if (e.type === 'boss') continue;
      if (!(e.maxHp && (e.type === 'charger' || e.hurt > 0 || e.hp < e.maxHp))) continue;
      const s = project(e.x, e.y, e.r * 2.4 + 22);
      if (s.behind) continue;
      const bw = e.type === 'charger' ? 42 : 28;
      const pct = clamp(e.hp / e.maxHp, 0, 1);
      ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(s.x - bw / 2, s.y, bw, 4);
      ctx.fillStyle = e.type === 'charger' ? '#ffd36d' : '#ff7b72'; ctx.fillRect(s.x - bw / 2, s.y, bw * pct, 4);
    }
  }


  function draw() {
    // 3D world (WebGL) ...
    render3D();
    // ... then the crisp 2D HUD overlay on top.
    ctx = screenCtx;
    ctx.clearRect(0, 0, W, H);
    if (!gl3dOk) {
      ctx.fillStyle = '#1a1722'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff1bb'; ctx.textAlign = 'center';
      ctx.font = '800 22px system-ui, sans-serif';
      ctx.fillText('此瀏覽器未啟用 WebGL，無法顯示 3D 畫面', W / 2, H / 2 - 10);
      ctx.font = '600 15px system-ui, sans-serif';
      ctx.fillText('請改用較新的瀏覽器，或在設定中開啟硬體加速 / WebGL', W / 2, H / 2 + 22);
      return;
    }
    if (game.flash > 0) {
      ctx.fillStyle = `rgba(255, 221, 148, ${game.flash * 0.22})`;
      ctx.fillRect(0, 0, W, H);
    }
    drawEnemyBars();
    drawFloatingTexts();
    drawReticle();
    drawUi();
    drawFusionBanner();
    drawBossPhaseBanner();

    if (game.state === 'title') drawTitle();
    if (game.state === 'upgrade') drawUpgrade();
    if (game.state === 'over') drawEnd(false);
    if (game.state === 'win') drawEnd(true);
  }

  const TH = TILE * VIEW.depth; // projected (compressed) tile height in screen px

  function drawMap() {
    // Back wall / sky behind the arena (everything above the horizon line).
    const wall = ctx.createLinearGradient(0, 0, 0, VIEW.horizon);
    wall.addColorStop(0, '#211b29');
    wall.addColorStop(1, '#322a3c');
    ctx.fillStyle = wall;
    ctx.fillRect(0, 0, W, VIEW.horizon + 4);

    // Floor backdrop (everything from the horizon down).
    const floorBg = ctx.createLinearGradient(0, VIEW.horizon, 0, H);
    floorBg.addColorStop(0, '#2c2733');
    floorBg.addColorStop(1, '#221d28');
    ctx.fillStyle = floorBg;
    ctx.fillRect(0, VIEW.horizon, W, H - VIEW.horizon);

    // Subtle skirting where the back wall meets the floor.
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.fillRect(0, VIEW.horizon, W, 3);

    // Iterate back-to-front so raised walls correctly overlap what is behind.
    for (let y = 0; y < ROWS; y++) {
      const sy = VIEW.horizon + y * TH;
      for (let x = 0; x < COLS; x++) {
        const t = game.map[y][x];
        const px = x * TILE;
        if (t === TILE_FLOOR) {
          ctx.fillStyle = ((x + y) % 2 === 0) ? '#2d2732' : '#2a2430';
          ctx.fillRect(px, sy, TILE, TH + 0.5);
        } else if (t === TILE_GRASS) {
          ctx.fillStyle = '#355431';
          ctx.fillRect(px, sy, TILE, TH + 0.5);
          ctx.fillStyle = 'rgba(142, 210, 90, .28)';
          for (let i = 0; i < 4; i++) ctx.fillRect(px + 5 + i * 7, sy + 3 + ((x * y + i) % 5), 2.5, 6);
        } else if (t === TILE_BURNT) {
          ctx.fillStyle = '#30221d';
          ctx.fillRect(px, sy, TILE, TH + 0.5);
          ctx.fillStyle = 'rgba(40, 20, 16, .55)';
          ctx.fillRect(px + 5, sy + 3, TILE - 10, TH - 6);
        } else if (t === TILE_WATER) {
          ctx.fillStyle = '#24485b';
          ctx.fillRect(px, sy, TILE, TH + 0.5);
          ctx.fillStyle = 'rgba(121, 211, 255, .22)';
          ctx.beginPath();
          ctx.ellipse(px + 16, sy + TH / 2, 12, (4 + Math.sin(game.time * 2 + x) * 1.2), 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (t === TILE_ICE) {
          ctx.fillStyle = '#c7f6ff';
          ctx.fillRect(px, sy, TILE, TH + 0.5);
          ctx.strokeStyle = 'rgba(70, 142, 170, .55)'; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(px + 5, sy + 5); ctx.lineTo(px + 26, sy + 3); ctx.moveTo(px + 7, sy + TH - 4); ctx.lineTo(px + 25, sy + TH - 7); ctx.stroke();
          ctx.fillStyle = 'rgba(125, 207, 235, .25)';
          ctx.beginPath(); ctx.ellipse(px + 16, sy + TH / 2, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    // Faint floor grid (projected).
    ctx.strokeStyle = 'rgba(0,0,0,.16)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += TILE) { ctx.beginPath(); ctx.moveTo(x, VIEW.horizon); ctx.lineTo(x, VIEW.horizon + ROWS * TH); ctx.stroke(); }
    for (let y = 0; y <= ROWS; y++) { const gy = VIEW.horizon + y * TH; ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

    // Raised blocks (boundary walls + breakable thin walls), back-to-front.
    for (let y = 0; y < ROWS; y++) {
      const gy = VIEW.horizon + y * TH;
      for (let x = 0; x < COLS; x++) {
        const t = game.map[y][x];
        if (t !== TILE_WALL && t !== TILE_THIN) continue;
        const px = x * TILE;
        const h = t === TILE_WALL ? VIEW.wallH : VIEW.wallH * 0.7;
        const inset = t === TILE_THIN ? 3 : 0;
        const fx = px + inset, fw = TILE - inset * 2;
        // Front face.
        ctx.fillStyle = t === TILE_WALL ? '#463f4f' : '#6b573f';
        ctx.fillRect(fx, gy - h, fw, h + TH);
        // Top cap (catches the light).
        ctx.fillStyle = t === TILE_WALL ? '#6a6270' : '#9a805f';
        ctx.fillRect(fx, gy - h, fw, TH);
        // Highlight + base shadow.
        ctx.fillStyle = 'rgba(255,255,255,.10)';
        ctx.fillRect(fx, gy - h, fw, 2);
        ctx.fillStyle = 'rgba(0,0,0,.30)';
        ctx.fillRect(fx, gy + TH - 2, fw, 2);
      }
    }
  }

  // Run a draw callback in the flattened ground plane at a projected world
  // position, so circular ground effects read as ellipses lying on the floor.
  function onGround(wx, wy, fn) {
    const c = project(wx, wy);
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(1, VIEW.depth);
    fn();
    ctx.restore();
  }

  function drawZones() {
    for (const pc of game.poisonClouds) {
      const alpha = clamp(pc.life / pc.maxLife, 0, 1);
      const r = pc.r + Math.sin(pc.pulse) * 4;
      onGround(pc.x, pc.y, () => {
        const g = ctx.createRadialGradient(0, 0, 4, 0, 0, r);
        g.addColorStop(0, `rgba(160, 77, 210, ${0.42 * alpha})`);
        g.addColorStop(1, `rgba(91, 255, 126, ${0.05 * alpha})`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = `rgba(222, 149, 255, ${0.62 * alpha})`;
        ctx.stroke();
        ctx.setLineDash([6, 6]);
        ctx.strokeStyle = `rgba(255, 231, 105, ${0.28 * alpha})`;
        ctx.beginPath(); ctx.arc(0, 0, r + 5, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    for (const sc of game.steamClouds) {
      const alpha = clamp(sc.life / sc.maxLife, 0, 1);
      const r = sc.r + Math.sin(sc.pulse) * 6;
      onGround(sc.x, sc.y, () => {
        const g = ctx.createRadialGradient(0, 0, 3, 0, 0, r);
        g.addColorStop(0, `rgba(245, 255, 255, ${0.36 * alpha})`);
        g.addColorStop(1, `rgba(210, 240, 255, ${0.04 * alpha})`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = `rgba(230, 255, 255, ${0.42 * alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, r + 3, 0, Math.PI * 2); ctx.stroke();
      });
    }
    for (const fz of game.fireZones) {
      const alpha = clamp(fz.life / fz.maxLife, 0, 1);
      onGround(fz.x, fz.y, () => {
        const g = ctx.createRadialGradient(0, 0, 4, 0, 0, fz.r);
        g.addColorStop(0, `rgba(255, 218, 94, ${0.58 * alpha})`);
        g.addColorStop(0.45, `rgba(255, 111, 62, ${0.38 * alpha})`);
        g.addColorStop(1, `rgba(176, 34, 23, ${0.02 * alpha})`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0, 0, fz.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = `rgba(255, 190, 79, ${0.55 * alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, fz.r + 2, 0, Math.PI * 2); ctx.stroke();
      });
    }
    for (const ez of game.electricZones) {
      const alpha = clamp(ez.life / ez.maxLife, 0, 1);
      onGround(ez.x, ez.y, () => {
        ctx.fillStyle = `rgba(121, 220, 255, ${0.18 * alpha})`;
        ctx.beginPath(); ctx.arc(0, 0, ez.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = `rgba(180, 242, 255, ${0.9 * alpha})`;
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          const a = game.time * 5 + i * 1.256;
          ctx.beginPath();
          ctx.arc(0, 0, ez.r * (0.36 + i * 0.11), a, a + 0.75);
          ctx.stroke();
        }
      });
    }
    for (const ex of game.explosions) {
      const t = 1 - ex.life / ex.maxLife;
      onGround(ex.x, ex.y, () => {
        ctx.strokeStyle = `rgba(255, 238, 161, ${1 - t})`;
        ctx.lineWidth = 5 * (1 - t) + 1;
        ctx.beginPath(); ctx.arc(0, 0, ex.r * (0.3 + t * 0.7), 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = `rgba(255, 112, 55, ${(1 - t) * 0.16})`;
        ctx.beginPath(); ctx.arc(0, 0, ex.r * (0.2 + t), 0, Math.PI * 2); ctx.fill();
      });
    }
  }


  function drawBossWarnings() {
    for (const w of game.bossWarnings) {
      const alpha = clamp(w.life / w.maxLife, 0, 1);
      const t = 1 - alpha;
      // Warning ring lies flat on the floor.
      onGround(w.x, w.y, () => {
        ctx.globalAlpha = 0.95;
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 4 + Math.sin(game.time * 16) * 1.8;
        ctx.setLineDash([8, 6]);
        ctx.beginPath(); ctx.arc(0, 0, w.r * (0.72 + t * 0.28), 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = w.color.replace(')', ', .12)').replace('rgb', 'rgba');
        if (!w.color.startsWith('rgb')) ctx.fillStyle = 'rgba(255, 215, 110, .10)';
        ctx.beginPath(); ctx.arc(0, 0, w.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      });
      // Label drawn upright (not skewed) just above the marked spot.
      const c = project(w.x, w.y);
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.textAlign = 'center';
      ctx.fillStyle = w.color;
      ctx.font = '900 14px system-ui, sans-serif';
      const label = w.label || (w.type === 'poison' ? '毒瓶' : w.type === 'lightning' ? '雷擊' : w.type === 'fire' ? '火圈' : '蒸氣');
      ctx.fillText(label, c.x, c.y - 3);
      ctx.font = '900 11px system-ui, sans-serif';
      ctx.fillText(Math.max(0, w.life).toFixed(1), c.x, c.y + 14);
      ctx.restore();
    }
  }

  const PROJ_Z = 20; // height above the floor that flying things travel at

  function drawProjectiles() {
    for (const lb of game.lightningBolts) {
      const alpha = clamp(lb.life / lb.maxLife, 0, 1);
      const p1 = project(lb.x1, lb.y1, PROJ_Z);
      const p2 = project(lb.x2, lb.y2, PROJ_Z);
      ctx.strokeStyle = `rgba(229, 252, 255, ${alpha})`;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      const midX = (p1.x + p2.x) / 2 + rnd(-10, 10);
      const midY = (p1.y + p2.y) / 2 + rnd(-10, 10);
      ctx.lineTo(midX, midY);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      ctx.strokeStyle = `rgba(92, 198, 255, ${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    for (const fb of game.fireballs) {
      const s = project(fb.x, fb.y, PROJ_Z);
      const outer = fb.color || '#f4e7ff';
      const core = fb.coreColor || '#ffffff';
      const g = ctx.createRadialGradient(s.x - fb.r * .3, s.y - fb.r * .3, 2, s.x, s.y, fb.r * 2.4);
      g.addColorStop(0, core);
      g.addColorStop(0.35, outer);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(s.x, s.y, fb.r * 2.25, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(s.x, s.y, fb.r, 0, Math.PI * 2); ctx.fill();
      if (fb.kind === 'steam') {
        ctx.strokeStyle = 'rgba(255,255,255,.55)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(s.x, s.y, fb.r * 1.7 + Math.sin(game.time * 12) * 2, 0, Math.PI * 2); ctx.stroke();
      }
    }
    for (const b of game.enemyProjectiles) {
      const s = project(b.x, b.y, PROJ_Z);
      ctx.fillStyle = 'rgba(255, 140, 77, .25)';
      ctx.beginPath(); ctx.arc(s.x, s.y, b.r * 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, b.r, 0, Math.PI * 2); ctx.fill();
    }
  }

  // ---- Actors: upright side-view sprites, drawn back-to-front by depth ----
  function actorHeight(e) {
    if (e.type === 'boss') return 96;
    if (e.type === 'charger') return 58;
    if (e === game.player) return 50;
    return e.r * 2.2 + 18;
  }

  function drawActors() {
    const actors = game.enemies.slice();
    if (game.player) actors.push(game.player);
    // Smaller world-y = further back = drawn first.
    actors.sort((a, b) => a.y - b.y);
    for (const a of actors) {
      if (a === game.player) drawPlayerSprite();
      else drawEnemySprite(a);
    }
  }

  function drawActorBar(e, f) {
    if (!(e.maxHp && (e.type === 'boss' || e.type === 'charger' || e.hurt > 0 || e.hp < e.maxHp))) return;
    const bw = e.type === 'boss' ? 70 : (e.type === 'charger' ? 42 : 28);
    const pct = clamp(e.hp / e.maxHp, 0, 1);
    const by = f.y - actorHeight(e) - 8;
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(f.x - bw / 2, by, bw, 4);
    ctx.fillStyle = e.type === 'boss' ? '#66e0a6' : (e.type === 'charger' ? '#ffd36d' : '#ff7b72');
    ctx.fillRect(f.x - bw / 2, by, bw * pct, 4);
  }

  function drawEnemySprite(e) {
    const f = project(e.x, e.y);
    const tint = e.hurt > 0 ? '#fff3e2' : (e.slowTimer > 0 ? '#d8fbff' : null);
    const faceDir = e.type === 'charger'
      ? (Math.cos(e.facing) >= 0 ? 1 : -1)
      : ((game.player && game.player.x >= e.x) ? 1 : -1);

    if (e.type === 'boss') {
      // Floating mage, facing the camera.
      const hover = 30 + Math.sin(game.time * 2) * 4;
      groundShadow(e.x, e.y, e.r * 1.1, e.r * 0.5, 0.3);
      const bf = project(e.x, e.y, hover);
      const phase2 = e.phase === 2;
      ctx.save();
      ctx.translate(bf.x, bf.y);
      // robe
      ctx.fillStyle = '#34283d';
      ctx.beginPath(); ctx.moveTo(-16, 30); ctx.lineTo(16, 30); ctx.lineTo(10, -6); ctx.lineTo(-10, -6); ctx.closePath(); ctx.fill();
      ctx.fillStyle = phase2 ? '#ff8b47' : '#4fae86';
      ctx.fillRect(-16, 22, 32, 4);
      // head
      ctx.fillStyle = phase2 ? '#ffdf7a' : (e.hurt > 0 ? '#fff3e2' : '#66e0a6');
      ctx.beginPath(); ctx.arc(0, -16, e.r, 0, Math.PI * 2); ctx.fill();
      // eyes (front)
      ctx.fillStyle = '#2b1f34';
      ctx.fillRect(-10, -20, 6, 6); ctx.fillRect(4, -20, 6, 6);
      // pointed hat
      ctx.fillStyle = phase2 ? '#ff8b47' : '#3f8f6c';
      ctx.beginPath(); ctx.moveTo(-e.r, -24); ctx.lineTo(e.r, -24); ctx.lineTo(0, -24 - e.r * 1.7); ctx.closePath(); ctx.fill();
      // aura ring
      ctx.strokeStyle = phase2 ? '#ff8b47' : '#d998ff';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(0, -16, e.r + 8 + Math.sin(game.time * 6) * 2, 0, Math.PI * 2); ctx.stroke();
      // orbiting elements
      const colors = ['#ffbd66', '#bff4ff', '#9fe7ff', '#d998ff'];
      for (let i = 0; i < 4; i++) {
        const a = game.time * (phase2 ? 2.8 : 1.8) + i * Math.PI / 2;
        ctx.fillStyle = colors[i];
        ctx.beginPath(); ctx.arc(Math.cos(a) * 34, -16 + Math.sin(a) * 16, 6, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
      drawActorBar(e, project(e.x, e.y, hover));
      return;
    }

    groundShadow(e.x, e.y, e.r * 1.05, e.r * 0.45, 0.28);

    // Charge windup telegraph lies flat on the floor, aimed along e.facing.
    if (e.type === 'charger' && e.state === 'windup') {
      onGround(e.x, e.y, () => {
        ctx.rotate(e.facing);
        const warnPulse = 0.65 + Math.sin(game.time * 18) * 0.25;
        ctx.fillStyle = 'rgba(255, 87, 68, .16)';
        ctx.beginPath(); ctx.moveTo(e.r, -22); ctx.lineTo(178, 0); ctx.lineTo(e.r, 22); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = `rgba(255, 87, 68, ${warnPulse})`;
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(e.r + 8, 0); ctx.lineTo(170, 0); ctx.stroke();
      });
    }

    ctx.save();
    ctx.translate(f.x, f.y);

    if (e.type === 'slime') {
      const r = e.r;
      const bob = Math.sin(game.time * 4 + e.x * 0.1) * 2;
      // dome body facing camera
      ctx.fillStyle = tint || e.color;
      ctx.beginPath();
      ctx.moveTo(-r, 0);
      ctx.quadraticCurveTo(-r, -r * 1.6 + bob, 0, -r * 1.6 + bob);
      ctx.quadraticCurveTo(r, -r * 1.6 + bob, r, 0);
      ctx.quadraticCurveTo(r * 0.6, 3, 0, 3);
      ctx.quadraticCurveTo(-r * 0.6, 3, -r, 0);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.fillRect(-r * 0.5, -r * 1.2 + bob, 4, 4);
      // big front eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(-r * 0.55, -r * 0.9 + bob, 6, 7); ctx.fillRect(r * 0.2, -r * 0.9 + bob, 6, 7);
      ctx.fillStyle = '#10241a';
      ctx.fillRect(-r * 0.55 + (faceDir > 0 ? 2 : 0), -r * 0.6 + bob, 4, 4);
      ctx.fillRect(r * 0.2 + (faceDir > 0 ? 2 : 0), -r * 0.6 + bob, 4, 4);
    } else if (e.type === 'bug') {
      const r = e.r;
      // legs out to both sides
      ctx.strokeStyle = '#cfb5ff'; ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const yy = -r * 0.4 - i * 4;
        ctx.beginPath(); ctx.moveTo(-r * 0.6, yy); ctx.lineTo(-r * 1.25, yy + 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(r * 0.6, yy); ctx.lineTo(r * 1.25, yy + 4); ctx.stroke();
      }
      // body
      ctx.fillStyle = tint || e.color;
      ctx.beginPath(); ctx.ellipse(0, -r * 1.0, r * 0.95, r * 1.05, 0, 0, Math.PI * 2); ctx.fill();
      // front eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(-r * 0.5, -r * 1.4, 5, 5); ctx.fillRect(r * 0.1, -r * 1.4, 5, 5);
      ctx.fillStyle = '#2b153d';
      ctx.fillRect(-r * 0.5 + 1, -r * 1.4 + 1, 3, 3); ctx.fillRect(r * 0.1 + 1, -r * 1.4 + 1, 3, 3);
    } else if (e.type === 'imp') {
      const r = e.r;
      // teardrop body
      ctx.fillStyle = tint || e.color;
      ctx.beginPath(); ctx.moveTo(0, -r * 2.2); ctx.lineTo(r * 1.0, 0); ctx.lineTo(-r * 1.0, 0); ctx.closePath(); ctx.fill();
      // horns
      ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 1.9); ctx.lineTo(-r * 0.9, -r * 2.6); ctx.lineTo(-r * 0.15, -r * 2.0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(r * 0.5, -r * 1.9); ctx.lineTo(r * 0.9, -r * 2.6); ctx.lineTo(r * 0.15, -r * 2.0); ctx.closePath(); ctx.fill();
      // glowing eyes
      ctx.fillStyle = '#fff0a3';
      ctx.fillRect(-r * 0.55, -r * 1.5, 5, 5); ctx.fillRect(r * 0.1, -r * 1.5, 5, 5);
    } else if (e.type === 'charger') {
      const r = e.r;
      // bulky armored body, facing camera
      ctx.fillStyle = tint || '#b9925e';
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(-r * 0.95, -r * 2.0, r * 1.9, r * 2.0, 6); ctx.fill(); }
      else ctx.fillRect(-r * 0.95, -r * 2.0, r * 1.9, r * 2.0);
      // helmet
      ctx.fillStyle = tint || '#8f6f48';
      ctx.fillRect(-r * 0.7, -r * 2.5, r * 1.4, r * 0.7);
      ctx.fillStyle = e.state === 'stunned' ? '#d7ff8c' : '#ffd36d';
      ctx.fillRect(-r * 0.5, -r * 2.15, r * 1.0, 5); // eye visor slit
      // big shield held in front
      ctx.fillStyle = e.state === 'stunned' ? '#d7ff8c' : '#9c7a4f';
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(faceDir * r * 0.2 - r * 0.7, -r * 1.7, r * 1.4, r * 1.7, 5); ctx.fill(); }
      else ctx.fillRect(faceDir * r * 0.2 - r * 0.7, -r * 1.7, r * 1.4, r * 1.7);
      ctx.strokeStyle = 'rgba(210, 240, 255, .85)'; ctx.lineWidth = 3;
      ctx.strokeRect(faceDir * r * 0.2 - r * 0.5, -r * 1.45, r * 1.0, r * 1.2);
      if (e.state === 'stunned') {
        ctx.fillStyle = '#fff08a';
        for (let i = 0; i < 3; i++) {
          const a = game.time * 5 + i * Math.PI * 2 / 3;
          ctx.beginPath(); ctx.arc(Math.cos(a) * 14, -r * 2.9 + Math.sin(a) * 4, 3, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
    ctx.restore();
    drawActorBar(e, f);
  }

  function drawPlayerSprite() {
    const p = game.player;

    ctx.fillStyle = '#ffcc56'; ctx.fillRect(-12, -7, 24, 4); // belt

  function drawParticles() {
    for (const p of game.particles) {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      const s = project(p.x, p.y, PROJ_Z * 0.5);
      ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
      if (!p.color.startsWith('rgb')) ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(s.x, s.y, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawRings() {
    // Impact rings sit on the ground -> flatten into the floor plane.
    for (const rg of game.rings) {
      const t = 1 - rg.life / rg.maxLife;
      const alpha = clamp(rg.life / rg.maxLife, 0, 1);
      onGround(rg.x, rg.y, () => {
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = rg.color;
        ctx.lineWidth = Math.max(1, rg.width * alpha);
        ctx.beginPath();
        ctx.arc(0, 0, rg.r * (0.45 + t * 0.75), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      });
    }
  }

  function drawFloatingTexts() {
    ctx.font = '700 15px system-ui, sans-serif';
    ctx.textAlign = 'center';
    for (const t of game.floatingTexts) {
      const alpha = clamp(t.life / t.maxLife, 0, 1);
      const s = project(t.x, t.y, 30);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillText(t.text, s.x + 1, s.y + 1);
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, s.x, s.y);
      ctx.globalAlpha = 1;
    }
  }

  function drawReticle() {
    if (game.state !== 'playing') return;
    const s = project(mouse.x, mouse.y);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.strokeStyle = 'rgba(255, 241, 187, .75)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 9 + Math.sin(game.time * 8) * 1.5, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-7, 0); ctx.moveTo(7, 0); ctx.lineTo(16, 0); ctx.moveTo(0, -16); ctx.lineTo(0, -7); ctx.moveTo(0, 7); ctx.lineTo(0, 16); ctx.stroke();
    ctx.restore();
  }

  function roundRectPath(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  function elementIconInfo(el) {
    const map = {
      fire: ['🔥', '#ff8b47'], ice: ['❄', '#9feeff'], lightning: ['⚡', '#8fe8ff'], poison: ['☠', '#c07aff'],
      steam: ['☁', '#d8f6ff'], toxic_boom: ['☣', '#d998ff'], plasma: ['✦', '#ffcf6f'], frost_shock: ['✹', '#bff4ff'],
      toxic_shock: ['☠', '#b794ff'], venom_frost: ['◆', '#b7ffd2'], neutral: ['✦', '#f4e7ff']
    };
    return map[el] || map.neutral;
  }

  function drawSpellFormulaCard(x, y, w, h) {
    const spellColor = ELEMENT_INFO[game.stats.spellKind]?.color || '#ffe6a7';

    ctx.fillText('SPELL FORMULA', x + w / 2, y + 23);

    for (let i = 0; i < 2; i++) {
      const ex = x + 22 + i * 54, ey = y + 38;
      const el = elems[i] || null;
      roundRectPath(ctx, ex, ey, 42, 42, 8);
      ctx.fillStyle = el ? elementIconInfo(el)[1] : 'rgba(60,40,35,.18)'; ctx.fill();
      ctx.strokeStyle = el ? '#5a3326' : 'rgba(60,40,35,.25)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = el ? '#fff' : 'rgba(60,40,35,.35)'; ctx.font = '900 23px system-ui, sans-serif';

    ctx.fillStyle = '#5a3326'; ctx.font = '900 18px system-ui, sans-serif'; ctx.fillText('=', x + 128, y + 66);
    roundRectPath(ctx, x + 146, y + 38, 62, 42, 9); ctx.fillStyle = spellColor; ctx.fill(); ctx.strokeStyle = '#5a3326'; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '900 22px system-ui, sans-serif'; ctx.fillText(elementIconInfo(game.stats.spellKind)[0], x + 177, y + 66);
    ctx.textAlign = 'right'; ctx.fillStyle = '#3b2530'; ctx.font = '900 13px system-ui, sans-serif';
    ctx.fillText(game.stats.spellName, x + w - 16, y + h - 16);

      roundRectPath(ctx, 204, H - 58, 552, 38, 12); ctx.fillStyle = 'rgba(10, 8, 14, .76)'; ctx.fill(); ctx.strokeStyle = 'rgba(255,211,109,.25)'; ctx.stroke();
      ctx.textAlign = 'center'; ctx.fillStyle = '#fff1bb'; ctx.font = '900 14px system-ui, sans-serif';
      ctx.fillText('提示：唯一主魔法可被火、冰、雷、毒覆蓋；兩種元素會融合成新法術。', W / 2, H - 34);
    }

    // Secondary-attack indicator (bottom-left): name + cooldown.
    if (game.state === 'playing') {
      const sec = SECONDARY[game.stats.secondary];
      const ready = p.secondaryCooldown <= 0;
      const icy = game.stats.secondary === 'icewall';
      roundRectPath(ctx, 16, H - 52, 150, 36, 10); ctx.fillStyle = 'rgba(10,8,14,.72)'; ctx.fill();
      ctx.strokeStyle = ready ? (icy ? '#bff4ff' : '#d1a06a') : 'rgba(255,255,255,.18)'; ctx.stroke();
      ctx.textAlign = 'left'; ctx.font = '900 13px system-ui, sans-serif';
      ctx.fillStyle = ready ? '#fff1e2' : 'rgba(255,255,255,.5)';
      ctx.fillText('副攻 [右鍵]', 26, H - 34);
      ctx.fillStyle = ready ? (icy ? '#bff4ff' : '#e0b07a') : 'rgba(255,255,255,.45)';
      ctx.fillText(sec ? sec.name : '—', 26, H - 20);
      if (!ready && sec) {
        const f = 1 - p.secondaryCooldown / sec.cd;
        ctx.fillStyle = 'rgba(255,255,255,.16)'; ctx.fillRect(108, H - 30, 48, 6);
        ctx.fillStyle = icy ? '#bff4ff' : '#e0b07a'; ctx.fillRect(108, H - 30, 48 * f, 6);
      }
    }
    ctx.restore();
  }

  function drawPanel(x, y, w, h) {
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, 'rgba(33,24,45,.93)');
    g.addColorStop(1, 'rgba(14,11,20,.93)');
    roundRectPath(ctx, x, y, w, h, 18);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,211,109,.32)';
    ctx.lineWidth = 3;
    ctx.stroke();
    roundRectPath(ctx, x + 8, y + 8, w - 16, h - 16, 12);
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawTitle() {
    const bg = ctx.createRadialGradient(W / 2, H / 2, 80, W / 2, H / 2, 520);
    bg.addColorStop(0, 'rgba(118,72,180,.35)'); bg.addColorStop(1, 'rgba(0,0,0,.76)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    drawPanel(150, 74, 660, 500);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd36d'; ctx.font = '900 46px system-ui, sans-serif';
    ctx.fillText('Mini Mage Mayhem', W / 2, 142);
    ctx.fillStyle = '#9fe7ff'; ctx.font = '900 20px system-ui, sans-serif';
    ctx.fillText('v0.8 Art Style：魔法玩具箱 / 元素失控', W / 2, 178);
    ctx.fillStyle = '#f7ecd6'; ctx.font = '15px system-ui, sans-serif';
    ctx.fillText('新美術方向：大帽子小法師、桌上棋盤感、符文地板、元素彈體形狀差異、法術配方卡。', W / 2, 218);
    ctx.fillText('玩法不變：通過升級覆蓋唯一主魔法飛彈，兩種元素會融合並改變戰場。', W / 2, 244);
    const rows = [
      ['🔥 火', '火球：點燃草地、引爆毒霧', '#ffbd66'],
      ['❄ 冰', '冰箭：凍水成冰面、緩速敵人', '#bff4ff'],
      ['☁ 火 + 冰', '蒸氣彈：產生蒸氣雲、融冰、緩速', '#d8f6ff'],
      ['☣ 火 + 毒', '毒爆彈：製造毒霧並爆燃', '#d998ff'],
      ['✦ 火 + 雷', '電漿彈：爆炸並導電', '#ffd36d'],
      ['✹ 雷 + 冰', '電霜彈：導電、緩速、控場', '#9fe7ff']
    ];
    for (let i = 0; i < rows.length; i++) {
      const y = 306 + i * 28;
      ctx.fillStyle = rows[i][2]; ctx.font = '900 16px system-ui, sans-serif'; ctx.fillText(rows[i][0], 342, y);
      ctx.fillStyle = '#f3e9dc'; ctx.font = '14px system-ui, sans-serif'; ctx.fillText(rows[i][1], 572, y);
    }
    ctx.fillStyle = '#ffd36d'; ctx.font = '900 24px system-ui, sans-serif';
    ctx.fillText('點擊畫面或按 Enter 開始', W / 2, 522);
    ctx.fillStyle = '#c9c0d8'; ctx.font = '13px system-ui, sans-serif';
    ctx.fillText('WASD 移動｜滑鼠瞄準｜左鍵主魔法飛彈｜Space/Shift 閃避｜R 重開', W / 2, 550);
  }

  function upgradeMeta(up) {
    if (['inject_fire'].includes(up.id)) return { label: '元素', color: '#ffbd66' };
    if (['inject_ice'].includes(up.id)) return { label: '元素', color: '#bff4ff' };
    if (['inject_lightning'].includes(up.id)) return { label: '元素', color: '#9fe7ff' };
    if (['inject_poison'].includes(up.id)) return { label: '元素', color: '#d998ff' };
    if (['split','explode','trail','big','spread','toxic_boom','ice_lake','ice_shatter','shock'].includes(up.id)) return { label: '改造', color: '#fff1bb' };
    if (['danger','vamp','haste'].includes(up.id)) return { label: '通用', color: '#d7a0ff' };
    return { label: '升級', color: '#fff1bb' };
  }

  function drawUpgrade() {
    ctx.fillStyle = 'rgba(0,0,0,.64)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff0b5';
    ctx.font = '900 32px system-ui, sans-serif';
    ctx.fillText(game.wave >= 5 && !game.bossStarted ? 'Boss 前最後升級！' : `第 ${game.wave} 波清除！選一個升級`, W / 2, 126);
    ctx.fillStyle = '#e9dcff';
    ctx.font = '700 15px system-ui, sans-serif';
    ctx.fillText(`目前主法術：${game.stats.spellName}｜${spellDescription(game.stats.spellKind)}`, W / 2, 154);
    for (let i = 0; i < game.upgrades.length; i++) {
      const up = game.upgrades[i];
      const x = 165 + i * 215;
      const y = 198;
      drawPanel(x, y, 195, 238);
      const meta = upgradeMeta(up);
      ctx.fillStyle = meta.color;
      ctx.fillRect(x + 14, y + 14, 58, 22);
      ctx.fillStyle = '#1b1420';
      ctx.font = '900 12px system-ui, sans-serif';
      ctx.fillText(meta.label, x + 43, y + 30);
      ctx.fillStyle = '#ffd36d';
      ctx.font = '900 19px system-ui, sans-serif';
      ctx.fillText(`${i + 1}. ${up.name}`, x + 98, y + 58);

      if (up.element) {
        const preview = previewSpellState(up.element);
        const color = ELEMENT_INFO[preview.kind]?.color || '#fff1bb';
        const before = game.stats.spellName;
        ctx.fillStyle = 'rgba(255,255,255,.07)';
        ctx.fillRect(x + 16, y + 78, 163, 62);
        ctx.strokeStyle = preview.fused ? color : 'rgba(255,255,255,.14)';
        ctx.lineWidth = preview.fused ? 2 : 1;
        ctx.strokeRect(x + 16, y + 78, 163, 62);
        ctx.fillStyle = preview.fused ? color : '#fff08a';
        ctx.font = '900 13px system-ui, sans-serif';
        ctx.fillText(preview.fused ? '融合預覽' : '法術變化', x + 98, y + 96);
        ctx.fillStyle = '#f3e9dc';
        ctx.font = '700 12px system-ui, sans-serif';
        ctx.fillText(`${before} →`, x + 98, y + 116);
        ctx.fillStyle = color;
        ctx.font = '900 16px system-ui, sans-serif';
        ctx.fillText(preview.name, x + 98, y + 134);
        ctx.fillStyle = '#e9dcff';
        ctx.font = '13px system-ui, sans-serif';
        wrapText(preview.desc, x + 98, y + 166, 158, 17);
      } else {
        ctx.fillStyle = '#e9dcff';
        ctx.font = '14px system-ui, sans-serif';
        wrapText(up.desc, x + 98, y + 92, 158, 18);
      }

      ctx.fillStyle = '#8cecff';
      ctx.font = '800 13px system-ui, sans-serif';
      ctx.fillText('點擊或按 ' + (i + 1), x + 98, y + 214);
    }
    ctx.fillStyle = '#c9c0d8';
    ctx.font = '700 13px system-ui, sans-serif';
    ctx.fillText('提示：元素升級會直接改變唯一主攻擊；兩種元素會融合，第三種元素會替換最舊元素。', W / 2, 478);
  }

  function wrapText(text, x, y, maxWidth, lineHeight) {
    const chars = [...text];
    let line = '';
    let yy = y;
    for (const ch of chars) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, yy);
        line = ch;
        yy += lineHeight;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, x, yy);
  }

  function drawEnd(win) {
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.fillRect(0, 0, W, H);
    drawPanel(216, 76, 528, 520);
    ctx.textAlign = 'center';
    ctx.fillStyle = win ? '#afff9d' : '#ffb29d';
    ctx.font = '900 38px system-ui, sans-serif';
    ctx.fillText(win ? '勝利！災難倖存者' : '死亡！魔法失控', W / 2, 138);
    ctx.fillStyle = '#f3e9dc';
    ctx.font = '17px system-ui, sans-serif';
    wrapText(makeRunStory(win), W / 2, 174, 456, 20);
    ctx.fillText(`主法術：${game.stats.spellName}｜地圖：${game.run && game.run.arena ? game.run.arena.name : '未知'}｜流派：${currentFlowName()}`, W / 2, 224);
    ctx.fillText(`擊殺數：${game.kills}　分數：${game.score}`, W / 2, 258);
    ctx.fillText(`最大單次爆炸擊殺：${game.biggestBoom}　毒霧引爆：${game.chainBooms}`, W / 2, 292);
    ctx.fillText(`水池導電：${game.stats.waterElectrocutes}　凍結水面：${game.stats.frozenWater}　蒸氣雲：${game.stats.steamClouds}`, W / 2, 326);
    ctx.fillText(`燒草/破牆：${game.stats.burnedGrass}/${game.stats.shatteredWalls}　融合次數：${game.stats.fusions}`, W / 2, 360);
    ctx.fillText(`菁英擊殺 / 背面命中 / 格擋：${game.stats.elitesKilled} / ${game.stats.backHits} / ${game.stats.frontBlocks}`, W / 2, 384);
    ctx.fillText(`Boss傷害：${Math.round(game.stats.bossDamage)}　最後命中：${game.stats.bossLastHit}`, W / 2, 406);
    ctx.fillStyle = '#fff08a';
    ctx.font = '800 16px system-ui, sans-serif';
    wrapText(`本局最大災難：${game.stats.biggestDisaster}`, W / 2, 434, 450, 20);
    ctx.fillStyle = '#f3e9dc';
    ctx.font = '17px system-ui, sans-serif';
    ctx.fillStyle = '#fff1bb';
    ctx.font = '700 15px system-ui, sans-serif';
    const evText = game.run && game.run.events.length ? game.run.events.join(' → ') : '無事件';
    wrapText('本局事件：' + evText, W / 2, 466, 440, 20);
    ctx.fillStyle = '#d7c7ff';
    const buildText = game.stats.upgradeNames.length ? game.stats.upgradeNames.join(' / ') : '無升級';
    const spellText = game.stats.spellHistory ? game.stats.spellHistory.join(' → ') : game.stats.spellName;
    const fusionText = game.stats.fusionLog && game.stats.fusionLog.length ? '｜融合：' + game.stats.fusionLog.join(' / ') : '';
    wrapText('法術演化：' + spellText + fusionText, W / 2, 506, 440, 20);
    wrapText('Build：' + buildText, W / 2, 544, 440, 20);
    ctx.fillStyle = '#9fe7ff';
    ctx.font = '800 20px system-ui, sans-serif';
    ctx.fillText('按 R 重開', W / 2, 574);
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
