<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f6cff'/%3E%3Ccircle cx='8' cy='6' r='2.4' fill='%23ffd36d'/%3E%3C/svg%3E" />
  <title>Mini Mage Mayhem — 法術測試場</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8f3e8;
      user-select: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, #33213b 0%, #17141f 58%, #08070c 100%);
    }
    #stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.5));
      height: min(100vh, calc(100vw / 1.5));
      box-shadow: 0 0 0 2px #6a4a77, 0 0 0 6px rgba(255,211,109,.08), 0 22px 60px rgba(0,0,0,.55);
      background: #1d1723;
      cursor: crosshair;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* #game = 3D world (WebGL); #hud = crisp 2D overlay on top */
    #hud { pointer-events: none; background: transparent; }
    #train-panel{position:absolute;top:12px;left:12px;z-index:30;width:280px;background:rgba(14,11,20,.93);
      border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:9px 10px;color:#f3e9dc;
      font:600 12px system-ui,sans-serif;pointer-events:auto;box-shadow:0 8px 26px rgba(0,0,0,.5)}
    #train-panel.hidden{display:none}
    #train-panel .tp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    #train-panel .tp-sec{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin:5px 0;font-size:11px;color:#bda9c9}
    #train-panel button{background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:5px;
      padding:3px 7px;cursor:pointer;font:700 11px system-ui,sans-serif}
    #train-panel button:hover{background:#4a4057}
    #train-panel .tp-readout{margin-top:7px;padding:6px 7px;background:rgba(0,0,0,.4);border-radius:6px;
      font:700 11px ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#bfead0;line-height:1.5}
    #train-panel .tp-hint{margin-top:6px;font-size:10px;color:#8a7d96}
    #tp-list{margin-top:7px;max-height:236px;overflow-y:auto;border-top:1px solid rgba(255,255,255,.12);padding-top:6px}
    #tp-list.hidden{display:none}
    #tp-list .tp-lh{font-size:10px;color:#8a7d96;margin:4px 0 2px}
    #tp-list .tp-lrow{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}
    #tp-list .tp-li{font:600 10px system-ui,sans-serif;padding:2px 6px}
    #tp-list .tp-li.on{background:#5a4d2a;border-color:#ffd36d;color:#ffe6a7}
    #tp-show{position:absolute;top:12px;left:12px;z-index:30;pointer-events:auto;display:none;
      background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:6px;padding:5px 9px;cursor:pointer;font:700 12px system-ui}
  </style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="640"></canvas>
    <canvas id="hud" width="960" height="640"></canvas>
  </div>
</div>
<div id="train-panel">
  <div class="tp-h"><b>🧪 法術測試場</b><button data-act="ui:hide">隱藏 (T)</button></div>
  <div class="tp-sec">元素<button data-act="el:fire">火</button><button data-act="el:ice">冰</button><button data-act="el:lightning">雷</button><button data-act="el:poison">毒</button><button data-act="el:clear">清空</button></div>
  <div class="tp-sec">精通+<button data-act="mas:fire">火</button><button data-act="mas:ice">冰</button><button data-act="mas:lightning">雷</button><button data-act="mas:poison">毒</button></div>
  <div class="tp-sec">主攻<button data-act="main:spell">飛彈</button><button data-act="main:fist">土拳</button><button data-act="main:lightpalm">雷掌</button><button data-act="main:windpalm">風掌</button></div>
  <div class="tp-sec">副攻<button data-act="sec:none">無</button><button data-act="sec:icewall">冰牆</button><button data-act="sec:earthwall">土牆</button><button data-act="sec:oil">油</button><button data-act="sec:blackhole">黑洞</button></div>
  <div class="tp-sec">假人<button data-act="dummy:add">+3</button><button data-act="dummy:clear">清除</button><button data-act="heal:1">補血</button></div>
  <div class="tp-sec">道具<button data-act="prop:add">木箱+2</button><button data-act="prop:clear">清箱</button><span style="font-size:10px;color:#8a7d96">風推／土碎／雷充能</span></div>
  <div class="tp-sec">工具<button data-act="list:1">升級表</button><button data-act="reset:1">重置build</button><button data-act="open:up">看升級(抽卡預覽)</button></div>
  <div class="tp-readout" id="tp-readout"></div>
  <div id="tp-list" class="hidden"></div>
  <div class="tp-hint">WASD 移動・左鍵主攻・右鍵/Q 副攻・Space 衝刺・升級表點了直接套用</div>
</div>
<button id="tp-show">🧪 測試面板</button>
<script src="vendor/three.min.js"></script>
<script type="module">
import { W, H, TILE, COLS, ROWS, TILE_FLOOR, TILE_WALL, TILE_THIN, TILE_GRASS, TILE_BURNT, TILE_WATER, TILE_ICE, TILE_ICEWALL, TILE_OIL } from './js/constants.js';
import { rnd, clamp, dist, angleTo, norm, circleRectOverlap } from './js/utils.js';
import { ELEMENT_INFO, arenaTemplates, fusionKind, isFireKind, isIceKind, isLightningKind, isPoisonKind, isEarthKind } from './js/data.js';
import { game, keys, mouse, CAM } from './js/state.js';
import { applyUpgrade, currentFlowName, dashElement, isMastery, isSecMastery, makeRunStory, nearestLiftable, previewSpellState, resetGame, shoot, spellDescription, startRun, update, upgradeDesc, upgradeName, SECONDARY, injectElement, openUpgrade, spawnCrate, syncSpell, upgradePool } from './js/sim.js';
import { draw, updateMouseWorld, camera, mouseScreen, project } from './js/render.js';
(() => {
  'use strict';

  const canvas = document.getElementById('game');   // WebGL (3D world) canvas
  const hud = document.getElementById('hud');        // 2D overlay (HUD/text)
  const screenCtx = hud.getContext('2d');

  // `ctx` is the active 2D draw target (HUD overlay). The 3D world is drawn
  // with WebGL/Three.js; only HUD/text/menus use this 2D context.
  let ctx = screenCtx;

  // Project a world point (wx along x, wy along depth, wz = height) to HUD
  // screen pixels using the live 3D camera. Used for health bars / floating text.


  window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key.toLowerCase() === 'r' && (game.state === 'over' || game.state === 'win')) resetGame();
    if (game.state === 'title' && e.key === 'Enter') startRun();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    // Store cursor in canvas pixels; converted to a world ground point each
    // frame via a camera raycast (see updateMouseWorld), since the 3D camera moves.
    mouseScreen.x = (e.clientX - rect.left) / rect.width * W;
    mouseScreen.y = (e.clientY - rect.top) / rect.height * H;
  });
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) mouse.right = true;
    else mouse.down = true;
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button === 2) mouse.right = false;
    else mouse.down = false;
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());






  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const y = (e.clientY - rect.top) / rect.height * H;
    if (game.state === 'title') { startRun(); return; }
    if (game.state !== 'upgrade') return;
    for (let i = 0; i < game.upgrades.length; i++) {
      const bx = 210 + i * 185;
      const by = 220;
      if (x >= bx && x <= bx + 165 && y >= by && y <= by + 170) applyUpgrade(i);
    }
  });

  window.addEventListener('keydown', (e) => {
    if (game.state === 'upgrade') {
      if (e.key === '1') applyUpgrade(0);
      if (e.key === '2') applyUpgrade(1);
      if (e.key === '3') applyUpgrade(2);
    }
  });


  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    updateMouseWorld(); // refresh cursor->world aim before the sim step (render-owned)
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  resetGame();
  // ===== Training-sandbox panel (this page only) =====
  (function trainingPanel() {
    const panel = document.getElementById('train-panel');
    const showBtn = document.getElementById('tp-show');
    const readout = document.getElementById('tp-readout');
    const listEl = document.getElementById('tp-list');
    if (!panel) return;
    window.__game = game; // test-場 debug hook: inspect state from devtools/headless
    const applied = {};
    const btnFor = {};
    function spawnDummy() {
      const p = game.player; const a = Math.random() * Math.PI * 2; const d = 110 + Math.random() * 70;
      game.enemies.push({ type: 'slime', x: clamp(p.x + Math.cos(a) * d, 60, W - 60), y: clamp(p.y + Math.sin(a) * d, 60, H - 60),
        vx: 0, vy: 0, hp: 999999, maxHp: 999999, r: 16, speed: 0, color: '#75d56b', touch: 0, value: 0, hurt: 0,
        dummy: true, slowTimer: 0, chilled: false, stunTimer: 0, state: 'pursue', facing: 0, shootCd: 999, chargeCooldown: 999, blockTextCd: 0 });
    }
    function refresh() {
      const s = game.stats;
      const els = (s.spellElements || []).map(e => ELEMENT_INFO[e].name + (s.mastery[e] ? ('+' + s.mastery[e]) : '')).join(' + ') || '無';
      const sec = s.secondary ? SECONDARY[s.secondary].name : '無';
      const mods = ['split', 'explosive', 'trail', 'size'].filter(k => s[k]).map(k => k + s[k]).join(' ');
      const MAIN = { spell: '飛彈', fist: '土拳', lightpalm: '雷掌', windpalm: '風掌' };
      readout.textContent = '主法術：' + s.spellName + '\n元素：' + els + '\n主攻：' + (MAIN[s.mainMode] || s.mainMode) + '　副攻：' + sec + (mods ? '\n改造：' + mods : '');
    }
    function cat(up) {
      if (up.element) return '元素';
      if (up.id && up.id.indexOf('equip_') === 0) return '副攻';
      if (up.id && up.id.endsWith('_mode')) return '肉搏';
      if (up.id === 'dash_cd' || up.id === 'dash_power') return '衝刺';
      if (['vitality', 'swift', 'second_wind', 'vamp', 'haste', 'danger'].includes(up.id)) return '通用';
      return '改造';
    }
    function updateCounts() {
      for (const up of upgradePool) { const b = btnFor[up.id]; if (!b) continue; const n = applied[up.id] || 0; b.textContent = up.name + (n ? ' ×' + n : ''); b.classList.toggle('on', n > 0); }
    }
    function buildList() {
      const groups = {}; for (const up of upgradePool) (groups[cat(up)] = groups[cat(up)] || []).push(up);
      listEl.innerHTML = '';
      for (const g of ['元素', '改造', '衝刺', '副攻', '肉搏', '通用']) {
        if (!groups[g]) continue;
        const h = document.createElement('div'); h.className = 'tp-lh'; h.textContent = g; listEl.appendChild(h);
        const row = document.createElement('div'); row.className = 'tp-lrow';
        for (const up of groups[g]) {
          const btn = document.createElement('button'); btn.className = 'tp-li';
          btn.onclick = () => { up.apply(); applied[up.id] = (applied[up.id] || 0) + 1; updateCounts(); refresh(); };
          btnFor[up.id] = btn; row.appendChild(btn);
        }
        listEl.appendChild(row);
      }
      updateCounts();
    }
    function enterTraining() {
      if (game.state === 'title') startRun();
      game.training = true;
      game.enemies.length = 0; game.wave = 0;
      game.player.maxHp = 99999; game.player.hp = 99999;
      for (let i = 0; i < 5; i++) spawnDummy();
      addCrates();
      refresh();
    }
    function addCrates() {
      const p = game.player, a = p.facing || 0;
      for (let i = 0; i < 2; i++) spawnCrate(p.x + Math.cos(a) * (90 + i * 38), p.y + Math.sin(a) * (90 + i * 38));
    }
    function resetBuild() { for (const k in applied) delete applied[k]; resetGame(); enterTraining(); updateCounts(); }
    function toggle(hide) { panel.classList.toggle('hidden', hide); showBtn.style.display = hide ? 'block' : 'none'; }
    panel.addEventListener('click', (ev) => {
      const b = ev.target.closest('[data-act]'); if (!b) return;
      const parts = b.dataset.act.split(':'); const k = parts[0], v = parts[1];
      if (k === 'el') { if (v === 'clear') { game.stats.spellElements = []; syncSpell(); } else injectElement(v); }
      else if (k === 'mas') { game.stats.mastery[v] = (game.stats.mastery[v] || 0) + 1; }
      else if (k === 'main') { game.stats.mainMode = v; }
      else if (k === 'sec') { game.stats.secondary = v === 'none' ? null : v; }
      else if (k === 'dummy') { if (v === 'add') { for (let i = 0; i < 3; i++) spawnDummy(); } else { game.enemies = game.enemies.filter(e => !e.dummy); } }
      else if (k === 'prop') { if (v === 'add') addCrates(); else game.props.length = 0; }
      else if (k === 'heal') { game.player.hp = game.player.maxHp; }
      else if (k === 'open') { openUpgrade(); }
      else if (k === 'list') { listEl.classList.toggle('hidden'); }
      else if (k === 'reset') { resetBuild(); }
      else if (k === 'ui') { toggle(true); }
      refresh();
    });
    showBtn.onclick = () => toggle(false);
    window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 't') toggle(!panel.classList.contains('hidden')); });
    buildList();
    enterTraining();
  })();

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
