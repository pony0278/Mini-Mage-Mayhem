<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f6cff'/%3E%3Ccircle cx='8' cy='6' r='2.4' fill='%23ffd36d'/%3E%3C/svg%3E" />
  <title>Mini Mage Mayhem — 法術測試場</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8f3e8;
      user-select: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, #33213b 0%, #17141f 58%, #08070c 100%);
    }
    #stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.5));
      height: min(100vh, calc(100vw / 1.5));
      box-shadow: 0 0 0 2px #6a4a77, 0 0 0 6px rgba(255,211,109,.08), 0 22px 60px rgba(0,0,0,.55);
      background: #1d1723;
      cursor: crosshair;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* #game = 3D world (WebGL); #hud = crisp 2D overlay on top */
    #hud { pointer-events: none; background: transparent; }
    #train-panel{position:absolute;top:12px;left:12px;z-index:30;width:280px;background:rgba(14,11,20,.93);
      border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:9px 10px;color:#f3e9dc;
      font:600 12px system-ui,sans-serif;pointer-events:auto;box-shadow:0 8px 26px rgba(0,0,0,.5)}
    #train-panel.hidden{display:none}
    #train-panel .tp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    #train-panel .tp-sec{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin:5px 0;font-size:11px;color:#bda9c9}
    #train-panel button{background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:5px;
      padding:3px 7px;cursor:pointer;font:700 11px system-ui,sans-serif}
    #train-panel button:hover{background:#4a4057}
    #train-panel .tp-readout{margin-top:7px;padding:6px 7px;background:rgba(0,0,0,.4);border-radius:6px;
      font:700 11px ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#bfead0;line-height:1.5}
    #train-panel .tp-hint{margin-top:6px;font-size:10px;color:#8a7d96}
    #tp-list{margin-top:7px;max-height:236px;overflow-y:auto;border-top:1px solid rgba(255,255,255,.12);padding-top:6px}
    #tp-list.hidden{display:none}
    #tp-list .tp-lh{font-size:10px;color:#8a7d96;margin:4px 0 2px}
    #tp-list .tp-lrow{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}
    #tp-list .tp-li{font:600 10px system-ui,sans-serif;padding:2px 6px}
    #tp-list .tp-li.on{background:#5a4d2a;border-color:#ffd36d;color:#ffe6a7}
    #tp-show{position:absolute;top:12px;left:12px;z-index:30;pointer-events:auto;display:none;
      background:#3a3147;color:#fff;border:1px solid #5a4f6a;border-radius:6px;padding:5px 9px;cursor:pointer;font:700 12px system-ui}
  </style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="640"></canvas>
    <canvas id="hud" width="960" height="640"></canvas>
  </div>
</div>
<div id="train-panel">
  <div class="tp-h"><b>🧪 法術測試場</b><button data-act="ui:hide">隱藏 (T)</button></div>
  <div class="tp-sec">元素<button data-act="el:fire">火</button><button data-act="el:ice">冰</button><button data-act="el:lightning">雷</button><button data-act="el:poison">毒</button><button data-act="el:clear">清空</button></div>
  <div class="tp-sec">精通+<button data-act="mas:fire">火</button><button data-act="mas:ice">冰</button><button data-act="mas:lightning">雷</button><button data-act="mas:poison">毒</button></div>
  <div class="tp-sec">主攻<button data-act="main:spell">飛彈</button><button data-act="main:fist">土拳</button><button data-act="main:lightpalm">雷掌</button><button data-act="main:windpalm">風掌</button></div>
  <div class="tp-sec">副攻<button data-act="sec:none">無</button><button data-act="sec:icewall">冰牆</button><button data-act="sec:earthwall">土牆</button><button data-act="sec:oil">油</button><button data-act="sec:blackhole">黑洞</button></div>
  <div class="tp-sec">假人<button data-act="dummy:add">+3</button><button data-act="dummy:clear">清除</button><button data-act="heal:1">補血</button></div>
  <div class="tp-sec">道具<button data-act="prop:add">木箱+2</button><button data-act="prop:clear">清箱</button><span style="font-size:10px;color:#8a7d96">風推／土碎／雷充能</span></div>
  <div class="tp-sec">工具<button data-act="list:1">升級表</button><button data-act="reset:1">重置build</button><button data-act="open:up">看升級(抽卡預覽)</button></div>
  <div class="tp-readout" id="tp-readout"></div>
  <div id="tp-list" class="hidden"></div>
  <div class="tp-hint">WASD 移動・左鍵主攻・右鍵/Q 副攻・Space 衝刺・升級表點了直接套用</div>
</div>
<button id="tp-show">🧪 測試面板</button>
<script src="vendor/three.min.js"></script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/training-panel.js"></script>
</body>
</html>
